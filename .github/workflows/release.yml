name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main or master
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main master --depth=1 || true

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main 2>/dev/null; then
            echo "Tag commit is reachable from origin/main."
            exit 0
          fi

          if git merge-base --is-ancestor "$GITHUB_SHA" origin/master 2>/dev/null; then
            echo "Tag commit is reachable from origin/master."
            exit 0
          fi

          echo "Release tags must point to a commit reachable from main or master."
          exit 1

      - name: Read version
        id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.name }}
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            artifact: sabio-linux-x64
            archive: tar
          - name: macOS
            os: macos-latest
            artifact: sabio-macos-arm64
            archive: tar
          - name: Windows
            os: windows-latest
            artifact: sabio-windows-x64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Stage release bundle
        shell: bash
        run: |
          mkdir -p "release/${{ matrix.artifact }}"
          cp -R dist "release/${{ matrix.artifact }}/dist"
          cp -R assets "release/${{ matrix.artifact }}/assets"
          cp -R server "release/${{ matrix.artifact }}/server"
          cp -R shared "release/${{ matrix.artifact }}/shared"
          cp package.json package-lock.json README.md VERSION tsconfig.json vite.config.ts "release/${{ matrix.artifact }}/"

          cat > "release/${{ matrix.artifact }}/README-RUN.txt" <<'EOF'
          Sabio release bundle

          1. Install Node.js 20 or newer.
          2. Run npm ci from this directory.
          3. Start Ollama locally.
          4. Run npm start.
          5. Open http://127.0.0.1:3000.
          EOF

      - name: Create tar archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir -p release-assets
          tar -czf "release-assets/${{ matrix.artifact }}-${{ needs.validate-tag.outputs.version }}.tar.gz" -C release "${{ matrix.artifact }}"

      - name: Create zip archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Compress-Archive -Path "release/${{ matrix.artifact }}" -DestinationPath "release-assets/${{ matrix.artifact }}-${{ needs.validate-tag.outputs.version }}.zip" -Force

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs:
      - validate-tag
      - build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: Sabio ${{ needs.validate-tag.outputs.version }}
          body: |
            Sabio ${{ needs.validate-tag.outputs.version }}

            This release includes Linux, macOS, and Windows distributable bundles created by the npm build flow.
          files: release-assets/*
